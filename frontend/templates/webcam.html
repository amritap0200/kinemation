<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam - Kinemation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Calibri, 'Segoe UI', Arial, sans-serif;
            background-color: #000000;
            color: #FFFFFF;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
        }
        .back-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 24px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .back-btn:hover {
            border-color: #FFFFFF;
            color: #FFFFFF;
        }
        .page-title {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(90deg, #00F0FF 0%, #4169E1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .spacer { width: 100px; }
        
                .preview-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .preview-container.active {
            border-color: #00F0FF;
        }
        .preview-container.recording {
            border-color: #EF4444;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { border-color: #EF4444; }
            50% { border-color: rgba(239, 68, 68, 0.4); }
        }
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .preview-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
        }
        .preview-icon { font-size: 72px; margin-bottom: 16px; }
        .preview-text { font-size: 18px; margin-bottom: 8px; }
        .preview-subtext { font-size: 14px; color: rgba(255,255,255,0.3); }
        
                .recording-indicator {
            position: absolute;
            top: 16px;
            left: 16px;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.9);
            border-radius: 8px;
        }
        .recording-indicator.active { display: flex; }
        .rec-dot {
            width: 10px;
            height: 10px;
            background: #FFFFFF;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .rec-time { font-family: 'Consolas', monospace; font-size: 14px; }
        
                .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
        }
        
        .ctrl-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 14px 32px;
            font-size: 16px;
            font-family: Calibri, sans-serif;
            color: #FFFFFF;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        .ctrl-btn:hover {
            border-color: #00F0FF;
            color: #00F0FF;
        }
        
        .record-btn {
            border-color: #EF4444;
            color: #EF4444;
            padding: 14px 40px;
        }
        .record-btn:hover {
            background: #EF4444;
            color: #FFFFFF;
        }
        
        .stop-btn {
            background: #EF4444;
            border-color: #EF4444;
            color: #FFFFFF;
        }
        .stop-btn:hover {
            background: #DC2626;
            border-color: #DC2626;
        }
        
        .process-btn {
            background: linear-gradient(90deg, #00F0FF 0%, #4169E1 100%);
            border: none;
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 600;
            color: #FFFFFF;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        .process-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 240, 255, 0.3);
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-btn">← Back to Home</a>
            <h1 class="page-title">Record with Webcam</h1>
            <div class="spacer"></div>
        </div>
        
        <div class="preview-container" id="previewContainer">
            <video id="videoPreview" autoplay muted playsinline class="hidden"></video>
            <div class="preview-placeholder" id="placeholder">
                <div class="preview-icon">🎥</div>
                <div class="preview-text">Camera preview will appear here</div>
                <div class="preview-subtext">Click "Start Camera" to begin</div>
            </div>
            <div class="recording-indicator" id="recIndicator">
                <div class="rec-dot"></div>
                <span class="rec-time" id="recTime">REC 00:00</span>
            </div>
        </div>
        
        <div class="controls" id="controls">
            <button class="ctrl-btn" id="startCameraBtn">📷 Start Camera</button>
            <button class="record-btn hidden" id="startRecordBtn">⏺ Start Recording</button>
            <button class="stop-btn hidden" id="stopRecordBtn">⏹ Stop Recording</button>
            <button class="ctrl-btn hidden" id="retakeBtn">🔄 Record Again</button>
            <button class="process-btn hidden" id="processBtn">Process Recording</button>
        </div>
    </div>
    
    <script>
        const video = document.getElementById('videoPreview');
        const placeholder = document.getElementById('placeholder');
        const previewContainer = document.getElementById('previewContainer');
        const recIndicator = document.getElementById('recIndicator');
        const recTime = document.getElementById('recTime');
        const startCameraBtn = document.getElementById('startCameraBtn');
        const startRecordBtn = document.getElementById('startRecordBtn');
        const stopRecordBtn = document.getElementById('stopRecordBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const processBtn = document.getElementById('processBtn');
        
        let stream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let recordingTimer = null;
        let recordingSeconds = 0;
        
        startCameraBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = stream;
                video.classList.remove('hidden');
                placeholder.classList.add('hidden');
                previewContainer.classList.add('active');
                
                startCameraBtn.classList.add('hidden');
                startRecordBtn.classList.remove('hidden');
            } catch (err) {
                alert('Could not access camera: ' + err.message);
            }
        });
        
        startRecordBtn.addEventListener('click', () => {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.start();
            
            previewContainer.classList.remove('active');
            previewContainer.classList.add('recording');
            recIndicator.classList.add('active');
            
            recordingSeconds = 0;
            updateRecordingTime();
            recordingTimer = setInterval(() => {
                recordingSeconds++;
                updateRecordingTime();
            }, 1000);
            
            startRecordBtn.classList.add('hidden');
            stopRecordBtn.classList.remove('hidden');
        });
        
        stopRecordBtn.addEventListener('click', () => {
            mediaRecorder.stop();
            clearInterval(recordingTimer);
            
            previewContainer.classList.remove('recording');
            recIndicator.classList.remove('active');
            
            stopRecordBtn.classList.add('hidden');
            retakeBtn.classList.remove('hidden');
            processBtn.classList.remove('hidden');
        });
        
        retakeBtn.addEventListener('click', () => {
            retakeBtn.classList.add('hidden');
            processBtn.classList.add('hidden');
            startRecordBtn.classList.remove('hidden');
            previewContainer.classList.add('active');
        });
        
        processBtn.addEventListener('click', () => {
            alert('TODO: Process recording with pipeline_3d.py');
        });
        
        function updateRecordingTime() {
            const mins = Math.floor(recordingSeconds / 60).toString().padStart(2, '0');
            const secs = (recordingSeconds % 60).toString().padStart(2, '0');
            recTime.textContent = `REC ${mins}:${secs}`;
        }
    </script>
</body>
</html>
