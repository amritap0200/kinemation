<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinemation - 3D Human Pose Estimation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Calibri, 'Segoe UI', Arial, sans-serif;
            background-color: #000000;
            color: #FFFFFF;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
                .page {
            position: relative;
            min-height: 100vh;
            width: 100%;
        }
        
                .mesh-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background-image: url('/assets/Looper BG.png');
            background-size: cover;
            background-position: bottom center;
            background-repeat: no-repeat;
            z-index: 0;
            pointer-events: none;
        }
        
                .github-link {
            position: fixed;
            top: 24px;
            right: 32px;
            z-index: 100;
            opacity: 0.9;
            transition: opacity 0.2s ease;
        }
        .github-link:hover {
            opacity: 1;
        }
        .github-link img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }
        
                .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 10vh;
            min-height: 100vh;
        }
        
                .logo {
            margin-bottom: 40px;
        }
        .logo img {
            max-width: 580px;
            height: auto;
        }
        
                .description {
            font-size: 18px;
            color: #FFFFFF;
            text-align: center;
            line-height: 1.7;
            max-width: 700px;
            margin: 0 auto 56px auto;
            padding: 0 24px;
            font-weight: 400;
        }
        
                .buttons {
            display: flex;
            gap: 32px;
            justify-content: center;
            align-items: center;
        }
        
                .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 52px;
            font-size: 16px;
            font-family: Calibri, sans-serif;
            font-weight: 400;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 50px;
            background: transparent;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
        }
        
                .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            padding: 2px;
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        
                .btn-webcam::before {
            background: linear-gradient(90deg, #4169E1 0%, #00D4FF 100%);
        }
        .btn-webcam:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
        }
        
                .btn-upload::before {
            background: linear-gradient(90deg, #FF1CF7 0%, #9945FF 100%);
        }
        .btn-upload:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(255, 28, 247, 0.3);
        }
    </style>
</head>
<body>
    <div class="page">
                <div class="mesh-bg"></div>
        
                <a href="https://github.com/acmpesuecc/kinemation" target="_blank" class="github-link">
            <img src="/assets/mdi_github.png" alt="GitHub">
        </a>
        
                <div class="content">
                        <div class="logo">
                <img src="/assets/Kinemation.png" alt="Kinemation">
            </div>
            
                        <p class="description">
                Kinemation is an integrated 3D human pose estimation system that
                transforms video into accurate, multi-person
                skeletal data. It combines cutting-edge 2D detection with temporal
                3D lifting to deliver smooth, consistent pose
                tracking across entire videos.
            </p>
            
                        <div class="buttons">
                <a href="/webcam" class="btn btn-webcam">Webcam</a>
                <a href="/upload" class="btn btn-upload">Upload</a>
            </div>
        </div>
    </div>
</body>
</html>
